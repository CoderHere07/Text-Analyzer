<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Cleaner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }
        .navbar-brand {
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .output-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .output-box {
            background-color: #f1f3f5;
            border-radius: 8px;
            padding: 1.25rem;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #343a40;
            min-height: 120px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .badge-counter {
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">✦ TextCleaner</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/finalOutput">Output</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <!-- Header -->
                <div class="mb-4">
                    <h1 class="fw-semibold mb-1">Cleaned Output</h1>
                    <p class="text-muted mb-0">Your text has been processed successfully.</p>
                </div>

                <!-- Output Card -->
                <div class="card output-card mb-4">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title mb-0 fw-semibold">Result</h5>
                            <span class="badge bg-secondary badge-counter">
                                {{ counter }} character{% if counter != 1 %}s{% endif %}
                            </span>
                        </div>
                        <div class="output-box">{{ data }}</div>
                    </div>
                </div>

                <!-- Back Button -->
                <a href="/" class="btn btn-dark px-4">← Process another text</a>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
