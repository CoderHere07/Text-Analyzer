<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }
        .navbar-brand {
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .analyzer-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .form-control:focus {
            border-color: #343a40;
            box-shadow: 0 0 0 0.2rem rgba(52,58,64,0.15);
        }
        .form-check-input:checked {
            background-color: #343a40;
            border-color: #343a40;
        }
        .form-check-label {
            font-size: 0.95rem;
            color: #495057;
        }
        .options-group {
            background-color: #f1f3f5;
            border-radius: 8px;
            padding: 1rem 1.25rem;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">✦ TextCleaner</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/finalOutput">Output</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <!-- Header -->
                <div class="mb-4">
                    <h1 class="fw-semibold mb-1">Text Analyzer</h1>
                    <p class="text-muted mb-0">Paste your text below and choose the cleaning options.</p>
                </div>

                <!-- Form Card -->
                <div class="card analyzer-card">
                    <div class="card-body p-4">
                        <form action="/finalOutput" method="GET">

                            <!-- Textarea -->
                            <div class="mb-4">
                                <label for="textInput" class="form-label fw-semibold">Your Text</label>
                                <textarea
                                    class="form-control"
                                    id="textInput"
                                    name="data"
                                    rows="6"
                                    placeholder="Paste or type your text here..."></textarea>
                            </div>

                            <!-- Options -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Cleaning Options</label>
                                <div class="options-group d-flex flex-column gap-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="removePunc" id="removePunc" value="on">
                                        <label class="form-check-label" for="removePunc">Remove Punctuation</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="removeSpa" id="removeSpa" value="on">
                                        <label class="form-check-label" for="removeSpa">Remove Spaces</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="removeExtraLine" id="removeExtraLine" value="on">
                                        <label class="form-check-label" for="removeExtraLine">Remove Extra Lines</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Submit -->
                            <button type="submit" class="btn btn-dark px-4">Analyze →</button>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
